name: Mlops 5

on:
  push:
    branches:
      - "**"

jobs:
  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Run flake8 linter
        run: |
          flake8 .

  train:
    needs: linter
    runs-on: ubuntu-latest
    if: >
      needs.linter.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: python train1.py

      - name: Upload model_info.txt artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Create failure log
        if: failure()
        run: |
          echo Training job failed. > error_logs.txt
          echo Branch: ${{ github.ref_name }} >> error_logs.txt
          echo Commit: ${{ github.sha }} >> error_logs.txt
          echo Commit message: ${{ github.event.head_commit.message }} >> error_logs.txt

      - name: Upload error logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup resources
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."

  deploy:
    needs: train
    runs-on: ubuntu-latest
    if: needs.train.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download model_info.txt
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .

      - name: Show run id
        run: cat model_info.txt
